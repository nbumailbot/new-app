<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Perfect Tming Deluxe</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary-bg: #0d0c12;
            --accent: #4ef2d2;
            --text-dark: #5d5a68;
            --text-mid: #8e8a9f;
            --miss: #ff4a5a;
            --good: #a4f7e6;
            --perfect: #4ef2d2;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            transition: transform 0.05s ease-out; /* Siltanish silliq chiqishi uchun */
        }

        body {
            background-color: var(--primary-bg);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        /* Yuqori Panel */
        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 400px;
            margin-top: 10px;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-dark);
            font-size: 24px;
            cursor: pointer;
        }

        .title {
            font-size: 14px;
            letter-spacing: 4px;
            font-weight: 700;
            color: var(--text-mid);
            text-transform: uppercase;
        }

        /* Statistika Paneli */
        .stats-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            gap: 12px;
            margin-top: 20px;
        }

        .stat-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px 5px;
            text-align: center;
            position: relative;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-dark);
            letter-spacing: 2px;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #ffffff;
            font-family: monospace;
        }

        .stat-box.combo-active {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(78, 242, 210, 0.1);
        }
        .stat-box.combo-active .stat-value {
            color: var(--accent);
        }

        /* O'yin maydoni va status */
        .game-area {
            width: 100%;
            max-width: 400px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .feedback-text {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 40px;
            height: 35px;
            text-transform: uppercase;
            position: absolute;
            top: -50px; /* Joyini to'g'irlash */
            opacity: 0; /* Boshida ko'rinmaydi */
        }

        canvas {
            width: 100%;
            height: 80px;
            background: transparent;
        }

        .hint-text {
            font-size: 10px;
            color: #413f4c;
            letter-spacing: 1px;
            margin-top: 20px;
            text-transform: uppercase;
        }

        /* Pastki Katta Tugma */
        .tap-button {
            width: 100%;
            max-width: 400px;
            background-color: var(--accent);
            color: #0d0c12;
            border: none;
            border-radius: 16px;
            padding: 20px;
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(78, 242, 210, 0.3);
            transition: all 0.1s ease;
        }

        .tap-button:active {
            background-color: #3cdbc0;
            transform: scale(0.97);
        }

        /* =========================================
           Animatsiyalar (CSS)
           ========================================= */

        /* 1. Matn pop-up va fade-out animatsiyasi */
        @keyframes feedback-pop {
            0% { transform: scale(0.8) translateY(10px); opacity: 0; }
            30% { transform: scale(1.1) translateY(-5px); opacity: 1; }
            70% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(1) translateY(-10px); opacity: 0; }
        }

        .animate-feedback {
            animation: feedback-pop 0.6s ease-out forwards;
        }

        /* Matn ranglari va glow effektlari */
        .feedback-perfect { color: var(--perfect); text-shadow: 0 0 15px var(--perfect); }
        .feedback-good { color: var(--good); text-shadow: 0 0 10px var(--good); }
        .feedback-miss { color: var(--miss); text-shadow: 0 0 15px var(--miss); }

        /* 2. Combo jump animatsiyasi */
        @keyframes combo-jump {
            0% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0); }
        }
        .animate-combo-jump {
            animation: combo-jump 0.15s ease-out;
        }

        /* 3. Butun ekran silkib ketish animatsiyasi (Yengil) */
        @keyframes screen-jolt {
            0% { transform: translateY(0) scale(1); }
            50% { transform: translateY(4px) scale(0.99); }
            100% { transform: translateY(0) scale(1); }
        }
        .animate-screen-jolt {
            animation: screen-jolt 0.12s ease-in-out;
        }

        /* 4. Shake (Siltanish) animatsiyasi (Miss bo'lganda) */
        @keyframes missed-shake {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-10px); }
            30% { transform: translateX(10px); }
            45% { transform: translateX(-8px); }
            60% { transform: translateX(8px); }
            75% { transform: translateX(-5px); }
        }
        .animate-shake {
            animation: missed-shake 0.35s ease-in-out;
        }

    </style>
</head>
<body>

    <div class="header">
        <button class="btn-icon" onclick="tgClose()">❮</button>
        <div class="title">Perfect Timing Deluxe</div>
        <button class="btn-icon" onclick="resetGame()">↺</button>
    </div>

    <div class="stats-container">
        <div class="stat-box">
            <div class="stat-label">SCORE</div>
            <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat-box" id="combo-box">
            <div class="stat-label">COMBO</div>
            <div class="stat-value" id="combo">x0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">BEST</div>
            <div class="stat-value" id="best">0</div>
        </div>
    </div>

    <div class="game-area" id="game-area">
        <div class="feedback-text" id="feedback"></div>
        <canvas id="gameCanvas"></canvas>
        <div class="hint-text">Tap when the cursor hits the glow</div>
    </div>

    <button class="tap-button" id="tapBtn">
        <span>👤 TP ANYWHERE</span>
    </button>

    <script>
        // Telegram WebApp sozlamalari
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        function tgClose() {
            if (tg) tg.close();
        }

        // Canvas elementlari
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // O'yin o'zgaruvchilari
        let score = 0;
        let combo = 0;
        let best = localStorage.getItem('perfect_timing_best_dlx') || 0;
        document.getElementById('best').innerText = best;

        // Kursor va nishon (Glow) parametrlari
        let cursorX = 0;
        let baseSpeed = 4;
        let cursorSpeed = baseSpeed;
        let direction = 1;

        const trackHeight = 36;
        const targetWidth = 30;
        const perfectZoneWidth = 8;

        // Canvas o'lchamini moslashtirish
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        // O'yin loopi
        function update() {
            const width = canvas.width / window.devicePixelRatio;
            const height = canvas.height / window.devicePixelRatio;
            cursorX += cursorSpeed * direction;

            if (cursorX >= width - 10) direction = -1;
            else if (cursorX <= 10) direction = 1;

            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#181622';
            ctx.beginPath();
            ctx.roundRect(0, (height - trackHeight) / 2, width, trackHeight, 10);
            ctx.fill();

            const targetX = (width - targetWidth) / 2;
            const targetY = (height - trackHeight) / 2;
            ctx.shadowColor = '#4ef2d2';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#4ef2d2';
            ctx.beginPath();
            ctx.roundRect(targetX, targetY, targetWidth, trackHeight, 8);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.roundRect(cursorX - 2, (height - trackHeight - 8) / 2, 4, trackHeight + 8, 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            requestAnimationFrame(update);
        }

        // Animatsiyalarni boshqaruvchi funksiya
        function playAnimation(element, className) {
            // Animatsiyani qayta ishga tushirish uchun klasni olib tashlab, qayta qo'shish kerak
            element.classList.remove(className);
            void element.offsetWidth; // Bu "trigger" deb ataladi
            element.classList.add(className);
        }

        // Bosish logikasi
        function handleTap() {
            const width = canvas.width / window.devicePixelRatio;
            const targetCenter = width / 2;
            const distance = Math.abs(cursorX - targetCenter);

            const feedbackEl = document.getElementById('feedback');
            const comboBox = document.getElementById('combo-box');
            const gameArea = document.getElementById('game-area');
            const tapBtn = document.getElementById('tapBtn');

            feedbackEl.className = 'feedback-text'; // Klasni tozalash

            // 1. Natija va ball hisoblash
            if (distance <= perfectZoneWidth / 2) {
                // PERFECT
                score += 150 + (combo * 10);
                combo++;
                feedbackEl.innerText = "PERFECT";
                feedbackEl.classList.add('feedback-perfect');
                playAnimation(feedbackEl, 'animate-feedback'); // Pop-up animatsiya
                playAnimation(comboBox, 'animate-combo-jump'); // Combo jump
                playAnimation(gameArea, 'animate-screen-jolt'); // Screen jolt
                triggerHaptic('success'); // Vibratsiya (maxsus)
            } else if (distance <= targetWidth / 2) {
                // GOOD
                score += 50;
                combo++;
                feedbackEl.innerText = "GOOD";
                feedbackEl.classList.add('feedback-good');
                playAnimation(feedbackEl, 'animate-feedback');
                playAnimation(comboBox, 'animate-combo-jump');
                playAnimation(gameArea, 'animate-screen-jolt');
                triggerHaptic('heavy');
            } else {
                // MISS
                combo = 0;
                feedbackEl.innerText = "MISS";
                feedbackEl.classList.add('feedback-miss');
                playAnimation(feedbackEl, 'animate-feedback');
                playAnimation(comboBox, 'animate-shake'); // Combo shake (Siltanish)
                playAnimation(tapBtn, 'animate-shake'); // Tugma shake
                triggerHaptic('warning'); // Vibratsiya (xato uchun)
            }

            // Tezlik va UI yangilash
            cursorSpeed = baseSpeed + Math.min(Math.floor(combo / 3), 4);
            document.getElementById('score').innerText = score;
            document.getElementById('combo').innerText = 'x' + combo;
            combo > 0 ? comboBox.classList.add('combo-active') : comboBox.classList.remove('combo-active');

            if (score > best) {
                best = score;
                localStorage.setItem('perfect_timing_best_dlx', best);
                document.getElementById('best').innerText = best;
            }
        }

        // Telegram Vibratsiya funksiyasi
        function triggerHaptic(style) {
            // "light", "medium", "heavy", "rigid", "soft", "success", "warning", "error"
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred(style); // notificationOccurred maxsus tebranish beradi
            }
        }

        // O'yinni yangitdan boshlash
        function resetGame() {
            score = 0;
            combo = 0;
            cursorSpeed = baseSpeed;
            document.getElementById('score').innerText = '0';
            document.getElementById('combo').innerText = 'x0';
            document.getElementById('combo-box').classList.remove('combo-active');
            document.getElementById('feedback').innerText = '';
            triggerHaptic('rigid'); // Yangitdan boshlash uchun rigid tebranish
        }

        // Event Listeners
        document.getElementById('tapBtn').addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(); });
        document.getElementById('tapBtn').addEventListener('mousedown', handleTap);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') handleTap(); });
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        cursorX = canvas.width / window.devicePixelRatio / 2 - 50;
        update();
    </script>
</body>
</html>
